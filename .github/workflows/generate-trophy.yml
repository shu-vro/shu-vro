name: Generate Trophy Snapshot

on:
    workflow_dispatch:
    schedule:
        - cron: "0 0 * * *"
    push:
        branches:
            - main

permissions:
    contents: write

jobs:
    snapshot:
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash
        env:
            PORT: 8080
            GITHUB_TOKEN1: ${{ secrets.TOKEN1 }}
            AUTHORIZED_USER_ONLY: ${{ secrets.AUTHORIZED_USER_ONLY }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Deno
              uses: denoland/setup-deno@v1
              with:
                  deno-version: v1.x

            - name: Create .env for server
              run: |
                  cd github-profile-trophy
                  cat > .env <<'EOF'
                  PORT=${PORT}
                  GITHUB_TOKEN1=${GITHUB_TOKEN1}
                  AUTHORIZED_USER_ONLY=${AUTHORIZED_USER_ONLY}
                  EOF

            - name: Start trophy server
              run: |
                  cd github-profile-trophy
                  set -a
                  source .env
                  set +a
                  deno task start > server.log 2>&1 &
                  echo $! > server.pid

            - name: Wait for server to be ready
              run: |
                  for i in {1..30}; do
                    if curl -s http://localhost:${PORT} > /dev/null; then
                      break
                    fi
                    sleep 1
                  done

            - name: Fetch trophy SVG
              run: |
                  cd github-profile-trophy
                  set -a
                  source .env
                  set +a
                  mkdir -p output
                  curl --retry 20 --retry-delay 2 --fail \
                    "https://github-profile-trophy-shirshen-edition.vercel.app/?username=shu-vro&theme=discord&column=3&no-bg=true&margin-w=15&margin-h=15" \
                    -o output/github-profile-trophy.svg

            - name: Stop server
              if: always()
              run: |
                  if [ -f server.pid ]; then
                    kill $(cat server.pid) || true
                  fi

            - name: Deploy to Output Branch
              uses: peaceiris/actions-gh-pages@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./output
                  publish_branch: output
                  keep_files: true
                  commit_message: "Update trophy snapshot [skip ci]"
